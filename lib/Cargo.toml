[package]
name = "whalecrab_lib"
version.workspace = true
edition.workspace = true

# TODO: remove logging default feature
[features]
default = ["panic_logger"]

[[bench]]
name = "movegen"
harness = false

[[bench]]
name = "movemaking"
harness = false

[[bench]]
name = "piece_iteration"
harness = false

[dev-dependencies]
criterion = { version = "0.7.0", features = ["html_reports"] }

[dependencies]
panic_logger = { path = "../panic_logger", optional = true }
